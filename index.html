<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Name - Rental Catalog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body data-theme="dark">

    <header>
        <div class="logo">Store Name Rentals</div>
        <div class="search-container">
            <input type="search" id="search-bar" placeholder="Search products (by name or description)...">
        </div>
        <button id="theme-toggle">
            <i class="fas fa-sun"></i> 
        </button>
    </header>

    <div class="container">
        
        <aside class="sidebar">
            <h3>Categories</h3>
            <input type="search" id="sidebar-search" placeholder="Search categories..." class="sidebar-search-input"> 
            <nav id="category-nav">
                </nav>
        </aside>

        <div class="main-content-area">
            
            <main class="product-gallery" id="product-gallery">
                </main>

            <section id="product-detail-view" style="display: none;">
                </section>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
